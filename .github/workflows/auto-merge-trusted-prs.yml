name: Auto Merge Jaibhagwan PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: jaibhagwan-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    # Only run for PRs targeting 'main' that are not drafts
    if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secret
        env:
          OWNER_TOKEN: ${{ secrets.OWNER_TOKEN }}
        run: |
          if [ -z "$OWNER_TOKEN" ]; then
            echo "Error: OWNER_TOKEN secret is missing in GitHub Settings -> Secrets -> Actions."
            exit 1
          fi

      - name: Merge PR as Owner
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OWNER_TOKEN }}
          script: |
            const pullNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login.toLowerCase();
            const allowedAuthors = ['jaibhagwanjindal', 'gorusharma751'];

            // 1. Verify PR author is in the allowed list
            if (!allowedAuthors.map(a => a.toLowerCase()).includes(prAuthor)) {
              core.notice(`Skipping: PR author @${prAuthor} is not in the allowed list [${allowedAuthors.join(', ')}].`);
              return;
            }

            core.notice(`✅ PR author @${prAuthor} is allowed. Proceeding with merge...`);

            // 2. Identify the owner account from the token
            const viewer = await github.graphql(`query { viewer { login } }`);
            const ownerLogin = viewer.viewer.login;
            core.notice(`Acting as owner: @${ownerLogin}`);

            const { owner, repo } = context.repo;
            const deadlineMs = Date.now() + 5 * 60 * 1000; // Try for 5 minutes
            const waitMs = 20000; // Wait 20 seconds between tries

          
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            while (Date.now() < deadlineMs) {
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  merge_method: 'squash',
                  commit_title: `Auto-merge PR #${pullNumber} from @${prAuthor}`,
                  commit_message: `Automatically merged by @${ownerLogin} via GitHub Actions.`
                });

                core.notice(`✅ Successfully merged PR #${pullNumber} as @${ownerLogin}.`);
                return;
              } catch (error) {
                const status = error.status;
                // 405 (Blocked by CI), 409 (Conflict), or 422 (Unprocessable)
                if ([405, 409, 422].includes(status)) {
                  core.notice(`⏳ PR #${pullNumber} is not ready (Status ${status}). Checking again in 20 seconds...`);
                  await sleep(waitMs);
                  continue;
                }
                
                core.setFailed(`❌ Merge failed with error ${status}: ${error.message}`);
                return;
              }
            }

            core.setFailed("❌ Timeout: The PR was not ready to merge after 5 minutes.");
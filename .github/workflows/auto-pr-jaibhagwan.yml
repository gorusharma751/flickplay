name: Auto PR for Jaibhagwan Pushes

on:
  push:
    branches-ignore:
      - 'main'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-or-reuse-pr:
    if: github.actor == 'JaibhagwanJindal' || github.actor == 'jaibhagwanjindal'
    runs-on: ubuntu-latest
    steps:
      - name: Create Pull Request as JaibhagwanJindal
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.JAIBHAGWAN_TOKEN }}  # ← Use Jaibhagwan's token
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const head = `${owner}:${branch}`;
            const actor = context.actor;

            // 1. Check for existing open PR for this branch
            const openPrs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base: 'main'
            });

            if (openPrs.data.length > 0) {
              core.notice(`PR already exists for ${branch}: #${openPrs.data[0].number}`);
              return;
            }

            // 2. Create the PR
            const shortSha = context.sha.substring(0, 7);
            const title = `Contribution: ${branch} (${shortSha})`;
            const body = `Automatically generated PR for push by @${actor} to trigger Vercel Hobby build flow via Owner-signed merge.`;

            try {
              const pr = await github.rest.pulls.create({
                owner,
                repo,
                title,
                body,
                head: branch,
                base: 'main',
                maintainer_can_modify: true
              });

              core.notice(`✅ PR created by @${actor}: #${pr.data.number}`);
              
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.data.number,
                labels: ['auto-merge']
              });
              
            } catch (error) {
              core.setFailed(`Failed to create PR: ${error.message}`);
            }